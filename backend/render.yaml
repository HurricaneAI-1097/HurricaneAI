# Render Blueprint: HurricaneAI backend
# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY INSTRUCTIONS
# 1. Push this repo to GitHub (github.com/HurricaneAI-1097/HurricaneAI).
# 2. In Render: click "New +" → "Blueprint" → select the repo.
#    When prompted for the Blueprint file path, enter: backend/render.yaml
# 3. Render creates three services: hurricaneai-api, hurricaneai-worker, hurricaneai-redis.
# 4. In Render dashboard, set ALL "sync: false" vars on BOTH api & worker services:
#      DATABASE_URL        = your Supabase pooled connection string (port 6543)
#      SUPABASE_URL        = your Supabase project URL
#      SUPABASE_KEY        = your Supabase service_role key
#      SUPABASE_JWT_SECRET = your Supabase JWT secret
#      OPENAI_API_KEY      = your OpenAI API key
# 5. Trigger a manual deploy on hurricaneai-api.
# 6. Copy the api public URL → add /api/v1 → paste into Vercel as NEXT_PUBLIC_API_URL.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── FastAPI web service ──────────────────────────────────────────────────
  - type: web
    name: hurricaneai-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "8000"
      # ↓ Set these manually in the Render dashboard (marked sync: false = secret)
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # ↓ Non-secrets set here
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TEMPERATURE
        value: "0.2"
      - key: REDIS_URL
        fromService:
          type: redis
          name: hurricaneai-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://hurricaneai.vercel.app,http://localhost:3000"

  # ── ARQ background worker ────────────────────────────────────────────────
  - type: worker
    name: hurricaneai-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: starter
    autoDeploy: true
    dockerCommand: arq app.workers.tasks.WorkerSettings
    envVars:
      - key: APP_ENV
        value: prod
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TEMPERATURE
        value: "0.2"
      - key: REDIS_URL
        fromService:
          type: redis
          name: hurricaneai-redis
          property: connectionString

  # ── Redis (managed) ──────────────────────────────────────────────────────
  - type: redis
    name: hurricaneai-redis
    plan: starter
    ipAllowList: []       # internal Render network only
    maxmemoryPolicy: noeviction
